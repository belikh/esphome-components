# Seeed Studio XIAO 2-Channel Wi-Fi AC Energy Meter V1.0
# MCU: XIAO ESP32-C6
# Energy IC: BL0939
#
# Wiring (from schematic):
#   BL0939 RX/SDI (pin 14) ← XIAO D6 / GPIO16 (TX)  via R19 1kΩ
#   BL0939 TX/SDO (pin 15) → XIAO D7 / GPIO17 (RX)  via R21 1kΩ
#   BL0939 SCLK   (pin 13) — XIAO D1 / GPIO3   (PCB pull-up 1kΩ to 3V3)
#   CT1: MTEP43-205AAB-19305, 100A/50mA, burden 0.6Ω → IP1/IN1
#   CT2: MTEP43-205AAB-19305, 100A/50mA, burden 0.6Ω → IP2/IN2
#   Voltage: 5×22kΩ → ZMPT107-1 (1:1) → 24.9Ω → VP

substitutions:
  device_name: xiao-2ch-em
  friendly_name: XIAO 2-Channel Energy Meter

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}

esp32:
  board: seeed_xiao_esp32c6
  variant: esp32c6
  framework:
    type: esp-idf

# ESP32-C6 only supports esp-idf, not Arduino.

logger:

api:
  encryption:
    key: !secret api_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: "${device_name} Fallback"
    password: !secret fallback_password

external_components:
  - source: github://belikh/esphome-components
    components: [bl0939_xiao]

# BL0939 communicates at 4800 baud, 8 data bits, no parity, 2 stop bits.
# The XIAO ESP32-C6 TX/RX pins are D6 (GPIO16) and D7 (GPIO17).
uart:
  id: bl0939_uart
  tx_pin: GPIO16
  rx_pin: GPIO17
  baud_rate: 4800
  stop_bits: 2

sensor:
  - platform: bl0939_xiao
    uart_id: bl0939_uart
    update_interval: 10s

    # Optional: drive SCLK pin (D1/GPIO3) HIGH to reinforce the PCB pull-up
    # and ensure the BL0939 uses address 5 (default).
    sclk_pin:
      number: GPIO3
      mode: OUTPUT

    voltage:
      name: "${friendly_name} Voltage"
    current_1:
      name: "${friendly_name} Current CH1"
    current_2:
      name: "${friendly_name} Current CH2"
    active_power_1:
      name: "${friendly_name} Power CH1"
    active_power_2:
      name: "${friendly_name} Power CH2"
    energy_1:
      name: "${friendly_name} Energy CH1"
    energy_2:
      name: "${friendly_name} Energy CH2"
    energy_total:
      name: "${friendly_name} Energy Total"

    # Derived quantities (computed from voltage, current and active power;
    # apparent_current_x duplicates current_x numerically and is provided
    # only for naming compatibility with "effective/apparent current").
    apparent_power_1:
      name: "${friendly_name} Apparent Power CH1"
    apparent_power_2:
      name: "${friendly_name} Apparent Power CH2"
    reactive_power_1:
      name: "${friendly_name} Reactive Power CH1"
    reactive_power_2:
      name: "${friendly_name} Reactive Power CH2"
    power_factor_1:
      name: "${friendly_name} Power Factor CH1"
    power_factor_2:
      name: "${friendly_name} Power Factor CH2"
    active_current_1:
      name: "${friendly_name} Active Current CH1"
    active_current_2:
      name: "${friendly_name} Active Current CH2"
    reactive_current_1:
      name: "${friendly_name} Reactive Current CH1"
    reactive_current_2:
      name: "${friendly_name} Reactive Current CH2"
    apparent_current_1:
      name: "${friendly_name} Apparent Current CH1"
    apparent_current_2:
      name: "${friendly_name} Apparent Current CH2"

    # Additional native BL0939 registers (not derived/computed).
    fast_current_1:
      name: "${friendly_name} Fast Current CH1"
    fast_current_2:
      name: "${friendly_name} Fast Current CH2"
    chip_temperature:
      name: "${friendly_name} Chip Temperature"
